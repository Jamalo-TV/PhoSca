services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-digitizer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitizer_password}
      POSTGRES_DB: ${POSTGRES_DB:-digitizer}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digitizer} -d ${POSTGRES_DB:-digitizer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - app-storage:/app/storage
      - ./models:/app/models:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/app/storage
      - ./models:/app/models:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:8080"
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /var/run:rw,noexec,nosuid,size=16m
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
  redis-data:
  app-storage:
    driver: local
    driver_opts:
      type: none
      o: bind,rw,noexec,nosuid,nodev
      device: ${HOST_STORAGE_PATH:?Set HOST_STORAGE_PATH to the absolute storage directory path}
